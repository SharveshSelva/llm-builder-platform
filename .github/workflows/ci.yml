name: CI / CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: llm-builder-platform
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt --prefer-binary pytest pytest-asyncio httpx ruff

      - name: Lint (ruff)
        run: ruff check backend/ tests/ --ignore E501

      - name: Run unit tests
        env:
          GROQ_API_KEY: dummy-key-for-tests
          TAVILY_API_KEY: dummy-key-for-tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        env:
          GROQ_API_KEY: dummy-key-for-tests
          TAVILY_API_KEY: dummy-key-for-tests
        run: pytest tests/integration/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push backend image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/backend:latest \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/backend:${{ github.sha }} \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/backend:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build \
            -f docker/Dockerfile.frontend \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/frontend:latest \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/frontend:${{ github.sha }} \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ai-platform/frontend:${{ github.sha }}

      - name: Update backend image in Cloud Run YAML
        run: |
          sed -i "s|REGION-docker.pkg.dev/PROJECT_ID|${{ env.REGISTRY }}/${{ env.PROJECT_ID }}|g" \
            deploy/backend.cloudrun.yaml
          sed -i "s|PROJECT_ID-chroma|${{ env.PROJECT_ID }}-chroma|g" \
            deploy/backend.cloudrun.yaml

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run services replace deploy/backend.cloudrun.yaml \
            --region ${{ env.REGION }} \
            --quiet

      - name: Make backend publicly accessible
        run: |
          gcloud run services add-iam-policy-binding ai-platform-backend \
            --region ${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" || true

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ai-platform-backend \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Update frontend image + backend URL in Cloud Run YAML
        run: |
          sed -i "s|REGION-docker.pkg.dev/PROJECT_ID|${{ env.REGISTRY }}/${{ env.PROJECT_ID }}|g" \
            deploy/frontend.cloudrun.yaml
          sed -i "s|https://ai-platform-backend-HASH-uc.a.run.app|${{ steps.backend-url.outputs.url }}|g" \
            deploy/frontend.cloudrun.yaml

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run services replace deploy/frontend.cloudrun.yaml \
            --region ${{ env.REGION }} \
            --quiet

      - name: Make frontend publicly accessible
        run: |
          gcloud run services add-iam-policy-binding ai-platform-frontend \
            --region ${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" || true

      - name: Print deployment URLs
        run: |
          FRONTEND_URL=$(gcloud run services describe ai-platform-frontend \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo ""
          echo "========================================"
          echo "Deployment complete!"
          echo "Backend:  ${{ steps.backend-url.outputs.url }}"
          echo "Frontend: $FRONTEND_URL"
          echo "========================================"
