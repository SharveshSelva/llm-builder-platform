apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-platform-frontend
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/ai-platform/frontend:latest
          ports:
            - containerPort: 8501
          env:
            # Replace with your actual backend Cloud Run URL after first deploy
            - name: BACKEND_URL
              value: https://ai-platform-backend-HASH-uc.a.run.app
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
