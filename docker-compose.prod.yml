version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=FALSE

  backend:
    image: ${BACKEND_IMAGE}
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
  chroma_data:
